<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no">
  <title>Snake 3D</title>
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
    html, body {
      width: 100%; height: 100%;
      background: #050514;
      overflow: hidden;
      font-family: 'Segoe UI', monospace;
      touch-action: none;
    }
    canvas { display: block; touch-action: none; }

    #score {
      position: fixed;
      top: 16px; left: 50%;
      transform: translateX(-50%);
      color: #00ff88;
      font-size: clamp(1.1rem, 4vw, 1.8rem);
      font-weight: 700;
      letter-spacing: 8px;
      text-shadow: 0 0 20px #00ff88, 0 0 50px #00cc6688;
      pointer-events: none;
      user-select: none;
      z-index: 5;
    }

    #overlay {
      position: fixed; inset: 0;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      background: rgba(5, 5, 20, 0.85);
      backdrop-filter: blur(8px);
      cursor: pointer;
      z-index: 20;
    }
    #overlay h1 {
      font-size: clamp(2rem, 10vw, 5rem);
      font-weight: 900;
      color: #00ff88;
      text-shadow: 0 0 40px #00ff88, 0 0 100px #00cc6655;
      letter-spacing: clamp(4px, 2vw, 14px);
      margin-bottom: 1.2rem;
      animation: pulse 2s ease-in-out infinite;
    }
    @keyframes pulse {
      0%, 100% { text-shadow: 0 0 40px #00ff88, 0 0 80px #00cc6655; }
      50%       { text-shadow: 0 0 60px #00ffaa, 0 0 120px #00ff8877; }
    }
    #overlay p    { color: #6688aa; font-size: clamp(0.75rem, 3vw, 1rem); margin: 0.3rem 0; letter-spacing: 2px; }
    #overlay .sub { color: #334455; font-size: clamp(0.65rem, 2.5vw, 0.82rem); margin-top: 0.9rem; }
    #overlay.hidden { display: none; }

    /* ── D-pad ──────────────────────────────────────────────────────────── */

    /* Portrait mobile: strip at bottom */
    #dpad-wrap {
      position: fixed;
      bottom: 0; left: 0; right: 0;
      height: 220px;
      display: none;              /* shown only on coarse-pointer via JS */
      align-items: center;
      justify-content: center;
      background: linear-gradient(to top, rgba(5,5,20,0.92) 55%, transparent);
      z-index: 10;
    }

    /* Landscape mobile: small floating D-pad, bottom-right */
    @media (orientation: landscape) and (pointer: coarse) {
      #dpad-wrap {
        height: auto;
        left: auto; right: 20px;
        bottom: 16px; width: auto;
        background: none;
        padding: 8px;
        border-radius: 20px;
        background: rgba(5,5,20,0.55);
        backdrop-filter: blur(6px);
      }
    }

    #dpad {
      display: grid;
      grid-template-areas: ". up ." "left mid right" ". down .";
      grid-template-columns: repeat(3, 74px);
      grid-template-rows: repeat(3, 74px);
      gap: 5px;
    }

    /* Smaller D-pad in landscape */
    @media (orientation: landscape) and (pointer: coarse) {
      #dpad {
        grid-template-columns: repeat(3, 56px);
        grid-template-rows: repeat(3, 56px);
        gap: 4px;
      }
      .dbtn { width: 56px !important; height: 56px !important; font-size: 1.4rem !important; border-radius: 12px !important; }
      .dmid { width: 56px !important; height: 56px !important; }
    }

    .dbtn {
      width: 74px; height: 74px;
      background: rgba(0, 255, 136, 0.07);
      border: 2px solid rgba(0, 255, 136, 0.28);
      border-radius: 18px;
      color: #00ff88;
      font-size: 1.9rem;
      display: flex; align-items: center; justify-content: center;
      cursor: pointer;
      user-select: none;
      -webkit-tap-highlight-color: transparent;
      transition: background 0.08s, border-color 0.08s, transform 0.06s;
    }
    .dbtn:active {
      background: rgba(0, 255, 136, 0.26);
      border-color: rgba(0, 255, 136, 0.9);
      transform: scale(0.91);
    }
    .dbtn[data-d="up"]    { grid-area: up; }
    .dbtn[data-d="left"]  { grid-area: left; }
    .dbtn[data-d="right"] { grid-area: right; }
    .dbtn[data-d="down"]  { grid-area: down; }

    .dmid {
      grid-area: mid;
      width: 74px; height: 74px;
      display: flex; align-items: center; justify-content: center;
    }
    .dmid::after {
      content: '';
      width: 20px; height: 20px;
      border-radius: 50%;
      background: rgba(0,255,136,0.12);
      border: 1.5px solid rgba(0,255,136,0.1);
    }
  </style>
</head>
<body>
  <div id="score">SCORE: 0</div>

  <div id="overlay">
    <h1>SNAKE 3D</h1>
    <p>TOQUE para jogar</p>
    <p class="sub">Deslize ou use o D-pad &nbsp;|&nbsp; WASD / ↑↓←→</p>
  </div>

  <div id="dpad-wrap">
    <div id="dpad">
      <button class="dbtn" data-d="up">▲</button>
      <button class="dbtn" data-d="left">◀</button>
      <div class="dmid"></div>
      <button class="dbtn" data-d="right">▶</button>
      <button class="dbtn" data-d="down">▼</button>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.min.js"></script>

  <script>
    // Mostra qualquer erro JS diretamente na página
    window.onerror = function(msg, src, line) {
      var d = document.createElement('div');
      d.style.cssText = 'position:fixed;top:0;left:0;right:0;background:#ff2244;color:#fff;padding:12px 16px;z-index:9999;font-family:monospace;font-size:13px;';
      d.textContent = '❌ ERRO JS: ' + msg + ' — linha ' + line;
      document.body.appendChild(d);
    };
  </script>

  <script>

    const GRID = 20, HALF = GRID / 2, TICK = 140;

    // ── Touch/pointer detection ────────────────────────────────────────────────
    const isCoarse = window.matchMedia('(pointer: coarse)').matches;
    const DPAD_H = 220; // reserved height for portrait D-pad

    const dpadWrap = document.getElementById('dpad-wrap');
    if (isCoarse) dpadWrap.style.display = 'flex';

    function gameW() { return innerWidth; }
    function gameH() {
      // Portrait touch: leave room for D-pad strip
      if (isCoarse && innerWidth <= innerHeight) return innerHeight - DPAD_H;
      return innerHeight;
    }

    // ── Renderer ───────────────────────────────────────────────────────────────
    const renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setPixelRatio(Math.min(devicePixelRatio, 2));
    renderer.setSize(gameW(), gameH());
    renderer.shadowMap.enabled = true;
    renderer.shadowMap.type = THREE.PCFSoftShadowMap;
    renderer.toneMapping = THREE.ACESFilmicToneMapping;
    renderer.toneMappingExposure = 1.25;
    renderer.setClearColor(0x050514);
    document.body.prepend(renderer.domElement);

    // ── Scene & Camera ─────────────────────────────────────────────────────────
    const scene = new THREE.Scene();
    scene.fog = new THREE.Fog(0x050514, 60, 220); // updated dynamically after fit

    const camera = new THREE.PerspectiveCamera(50, gameW() / gameH(), 0.1, 600);

    // Fixed camera direction: (0,25,17) normalised → angle doesn't change, only distance
    const CAM_DIR = new THREE.Vector3(0, 25, 17).normalize();

    // Calcula distância da câmera usando trigonometria pura (sem APIs de Frustum)
    // Garante que o tabuleiro 20×20 cabe completamente em qualquer tamanho de ecrã
    function updateCamera() {
      const vHalf = THREE.MathUtils.degToRad(camera.fov / 2);
      const hHalf = Math.atan(Math.tan(vHalf) * camera.aspect);
      // HALF=10: metade do tabuleiro. A câmera precisa ver 10 unidades em ambas as direções
      const dist = (HALF / Math.sin(Math.min(vHalf, hHalf))) * 1.35;
      camera.position.copy(CAM_DIR.clone().multiplyScalar(dist));
      camera.lookAt(0, 0, 0);
      camera.updateProjectionMatrix();
      scene.fog.near = dist * 1.3;
      scene.fog.far  = dist * 5;
    }

    updateCamera();

    // ── Lighting ───────────────────────────────────────────────────────────────
    scene.add(new THREE.AmbientLight(0x112255, 3));

    const sun = new THREE.DirectionalLight(0xffffff, 4.5);
    sun.position.set(10, 20, 8);
    sun.castShadow = true;
    sun.shadow.mapSize.setScalar(2048);
    sun.shadow.camera.near = 1;
    sun.shadow.camera.far  = 300; // large enough for mobile zoomed-out camera
    sun.shadow.camera.left = sun.shadow.camera.bottom = -15;
    sun.shadow.camera.right = sun.shadow.camera.top   =  15;
    scene.add(sun);
    const rimLight = new THREE.DirectionalLight(0x2244ff, 1.8);
    rimLight.position.set(-10, 5, -10);
    scene.add(rimLight);

    // ── Board ──────────────────────────────────────────────────────────────────
    const floor = new THREE.Mesh(
      new THREE.BoxGeometry(GRID, 0.28, GRID),
      new THREE.MeshStandardMaterial({ color: 0x0c0c20, roughness: 0.95, metalness: 0.08 })
    );
    floor.position.y = -0.64; floor.receiveShadow = true;
    scene.add(floor);

    const gridHelper = new THREE.GridHelper(GRID, GRID, 0x1a3355, 0x111833);
    gridHelper.position.y = -0.49;
    scene.add(gridHelper);

    const bPts = [[-HALF,-HALF],[HALF,-HALF],[HALF,HALF],[-HALF,HALF],[-HALF,-HALF]]
      .map(([x,z]) => new THREE.Vector3(x, 0.02, z));
    scene.add(new THREE.Line(new THREE.BufferGeometry().setFromPoints(bPts),
      new THREE.LineBasicMaterial({ color: 0x0066cc })));

    // ── Snake Materials ────────────────────────────────────────────────────────
    const segGeo = new THREE.BoxGeometry(0.86, 0.86, 0.86);

    const faceTex = new THREE.TextureLoader().load('face.jpg');
    faceTex.colorSpace = THREE.SRGBColorSpace;

    const headSideMat = new THREE.MeshStandardMaterial({
      color: 0x00ff88, emissive: 0x00cc55, emissiveIntensity: 0.9,
      roughness: 0.12, metalness: 0.75
    });
    const faceMat = new THREE.MeshStandardMaterial({ map: faceTex, roughness: 0.3, metalness: 0.1 });
    // [+X, -X, +Y(top), -Y, +Z(frente→câmera), -Z]
    const headMats = [
      headSideMat, headSideMat,
      faceMat,        // top (+Y)
      headSideMat,
      faceMat,        // frente (+Z) — face visível pela câmera
      headSideMat,
    ];

    const bodyMat = new THREE.MeshStandardMaterial({
      color: 0x00bb66, emissive: 0x003322, emissiveIntensity: 0.35,
      roughness: 0.28, metalness: 0.55
    });

    // ── Beer Mug (food) ────────────────────────────────────────────────────────
    function createMug() {
      const g    = new THREE.Group();
      const gold = new THREE.MeshStandardMaterial({ color: 0xf0a825, roughness: 0.35, metalness: 0.25 });
      const foam = new THREE.MeshStandardMaterial({ color: 0xfff8e7, roughness: 0.92 });

      const body = new THREE.Mesh(new THREE.CylinderGeometry(0.27, 0.21, 0.65, 16), gold);
      body.castShadow = true; g.add(body);

      const fr = new THREE.Mesh(new THREE.CylinderGeometry(0.29, 0.27, 0.14, 16), foam);
      fr.position.y = 0.395; g.add(fr);

      const fd = new THREE.Mesh(
        new THREE.SphereGeometry(0.29, 16, 8, 0, Math.PI * 2, 0, Math.PI / 2), foam);
      fd.position.y = 0.465; g.add(fd);

      [
        { s:[0.13,0.05,0.05], p:[0.33, 0.18,0] },
        { s:[0.05,0.36,0.05], p:[0.37, 0,   0] },
        { s:[0.13,0.05,0.05], p:[0.33,-0.18,0] },
      ].forEach(({ s, p }) => {
        const m = new THREE.Mesh(new THREE.BoxGeometry(...s), gold);
        m.position.set(...p); m.castShadow = true; g.add(m);
      });

      const glow = new THREE.PointLight(0xffaa00, 5, 7);
      g.add(glow);
      return { group: g, glow };
    }
    const { group: mug, glow: mugGlow } = createMug();
    scene.add(mug);

    // ── Game helpers ───────────────────────────────────────────────────────────
    function toWorld(x, z) { return [x - HALF + 0.5, z - HALF + 0.5]; }

    function makeSeg(pos, isHead) {
      const m = new THREE.Mesh(segGeo, isHead ? headMats : bodyMat);
      m.castShadow = m.receiveShadow = true;
      const [wx, wz] = toWorld(pos.x, pos.z);
      m.position.set(wx, 0.5, wz);
      scene.add(m);
      return m;
    }

    // ── Game state ─────────────────────────────────────────────────────────────
    let snake, dir, nextDir, food, score, alive, tickId;
    const segs = [];
    const scoreEl = document.getElementById('score');
    const overlay  = document.getElementById('overlay');

    function spawnFood() {
      let p;
      do { p = { x: Math.random() * GRID | 0, z: Math.random() * GRID | 0 }; }
      while (snake.some(s => s.x === p.x && s.z === p.z));
      food = p;
      const [wx, wz] = toWorld(p.x, p.z);
      mug.position.set(wx, 0.5, wz);
    }

    function resetGame() {
      segs.forEach(m => scene.remove(m));
      segs.length = 0;
      snake   = [{ x:12, z:10 }, { x:11, z:10 }, { x:10, z:10 }];
      dir     = { x:1, z:0 };
      nextDir = { x:1, z:0 };
      score   = 0; alive = true;
      snake.forEach((p, i) => segs.push(makeSeg(p, i === 0)));
      spawnFood();
      scoreEl.textContent = 'SCORE: 0';
      overlay.classList.add('hidden');
      clearInterval(tickId);
      tickId = setInterval(tick, TICK);
    }

    function tick() {
      dir = nextDir;
      const nh = { x: snake[0].x + dir.x, z: snake[0].z + dir.z };
      if (nh.x < 0 || nh.x >= GRID || nh.z < 0 || nh.z >= GRID) return gameOver();
      const willEat = nh.x === food.x && nh.z === food.z;
      const body = willEat ? snake : snake.slice(0, -1);
      if (body.some(s => s.x === nh.x && s.z === nh.z)) return gameOver();
      if (!willEat) { scene.remove(segs.pop()); snake.pop(); }
      if (segs[0]) segs[0].material = bodyMat;
      segs.unshift(makeSeg(nh, true));
      snake.unshift(nh);
      if (willEat) { score++; scoreEl.textContent = `SCORE: ${score}`; spawnFood(); }
    }

    function gameOver() {
      alive = false; clearInterval(tickId);
      overlay.innerHTML = `
        <h1>GAME OVER</h1>
        <p>PONTUAÇÃO: ${score}</p>
        <p class="sub">TOQUE ou ENTER para recomeçar</p>
      `;
      overlay.classList.remove('hidden');
    }

    // ── Direction helper ───────────────────────────────────────────────────────
    function applyDir(dx, dz) {
      if (!dir) return; // jogo ainda não iniciado
      if (dx !== 0 && dir.x !== -dx) nextDir = { x: dx, z: 0 };
      if (dz !== 0 && dir.z !== -dz) nextDir = { x: 0, z: dz };
    }

    // ── Keyboard ───────────────────────────────────────────────────────────────
    document.addEventListener('keydown', e => {
      const k = e.key;
      if (k==='ArrowUp'   ||k==='w'||k==='W') applyDir(0,-1);
      if (k==='ArrowDown' ||k==='s'||k==='S') applyDir(0, 1);
      if (k==='ArrowLeft' ||k==='a'||k==='A') applyDir(-1,0);
      if (k==='ArrowRight'||k==='d'||k==='D') applyDir( 1,0);
      if ((k==='Enter'||k===' ') && !alive) resetGame();
      if (k.startsWith('Arrow')) e.preventDefault();
    });

    // ── D-pad buttons ──────────────────────────────────────────────────────────
    const dirMap = { up:[0,-1], down:[0,1], left:[-1,0], right:[1,0] };
    document.querySelectorAll('.dbtn').forEach(btn => {
      const [dx, dz] = dirMap[btn.dataset.d];
      const press = e => { e.preventDefault(); applyDir(dx, dz); };
      btn.addEventListener('touchstart', press, { passive: false });
      btn.addEventListener('mousedown',  press);
    });

    // ── Swipe on game canvas ───────────────────────────────────────────────────
    let tx0, ty0;
    renderer.domElement.addEventListener('touchstart', e => {
      tx0 = e.touches[0].clientX; ty0 = e.touches[0].clientY;
      e.preventDefault();
    }, { passive: false });
    renderer.domElement.addEventListener('touchend', e => {
      const dx = e.changedTouches[0].clientX - tx0;
      const dz = e.changedTouches[0].clientY - ty0;
      if (Math.abs(dx) < 15 && Math.abs(dz) < 15) return; // tap, not swipe
      if (Math.abs(dx) > Math.abs(dz)) applyDir(dx > 0 ? 1 : -1, 0);
      else                              applyDir(0, dz > 0 ? 1 : -1);
      e.preventDefault();
    }, { passive: false });

    // ── Tap overlay to start/restart ───────────────────────────────────────────
    overlay.addEventListener('touchstart', e => { e.preventDefault(); resetGame(); }, { passive: false });
    overlay.addEventListener('click', () => { if (!alive) resetGame(); });

    // ── Resize ────────────────────────────────────────────────────────────────
    window.addEventListener('resize', () => {
      const W = gameW(), H = gameH();
      renderer.setSize(W, H);
      camera.aspect = W / H;
      updateCamera();
    });

    // ── Render loop ────────────────────────────────────────────────────────────
    let t = 0;
    (function animate() {
      requestAnimationFrame(animate);
      t += 0.016;
      mug.position.y = 0.5 + Math.sin(t * 2.8) * 0.14;
      mug.rotation.y = t * 1.2;
      mugGlow.intensity = 4 + Math.sin(t * 5) * 1.5;
      headSideMat.emissiveIntensity = 0.75 + Math.sin(t * 4) * 0.2;
      renderer.render(scene, camera);
    })();
  </script>
</body>
</html>
