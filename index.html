<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Snake 3D</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #050514; overflow: hidden; font-family: 'Segoe UI', monospace; }
    canvas { display: block; }

    #score {
      position: fixed;
      top: 24px; left: 50%;
      transform: translateX(-50%);
      color: #00ff88;
      font-size: 1.8rem;
      font-weight: 700;
      letter-spacing: 8px;
      text-shadow: 0 0 20px #00ff88, 0 0 50px #00cc6688;
      pointer-events: none;
      user-select: none;
    }

    #overlay {
      position: fixed; inset: 0;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      background: rgba(5, 5, 20, 0.82);
      backdrop-filter: blur(6px);
    }
    #overlay h1 {
      font-size: 5rem; font-weight: 900;
      color: #00ff88;
      text-shadow: 0 0 40px #00ff88, 0 0 100px #00cc6655;
      letter-spacing: 14px;
      margin-bottom: 1.5rem;
      animation: pulse 2s ease-in-out infinite;
    }
    @keyframes pulse {
      0%, 100% { text-shadow: 0 0 40px #00ff88, 0 0 80px #00cc6655; }
      50% { text-shadow: 0 0 60px #00ffaa, 0 0 120px #00ff8877; }
    }
    #overlay p { color: #6688aa; font-size: 1.05rem; margin: 0.35rem 0; letter-spacing: 3px; }
    #overlay .sub { color: #334455; font-size: 0.82rem; margin-top: 1.2rem; letter-spacing: 2px; }
    #overlay.hidden { display: none; }
  </style>
</head>
<body>
  <div id="score">SCORE: 0</div>
  <div id="overlay" id="overlay">
    <h1>SNAKE 3D</h1>
    <p>ENTER ou ESPAÇO para jogar</p>
    <p class="sub">WASD &nbsp;|&nbsp; ↑ ↓ ← → para mover</p>
  </div>

  <script type="importmap">
  { "imports": { "three": "https://unpkg.com/three@0.160.0/build/three.module.js" } }
  </script>

  <script type="module">
    import * as THREE from 'three';

    // ── Constants ──────────────────────────────────────────────────────────────
    const GRID = 20;
    const HALF = GRID / 2;
    const TICK = 140; // ms per step

    // ── Renderer ───────────────────────────────────────────────────────────────
    const renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setPixelRatio(Math.min(devicePixelRatio, 2));
    renderer.setSize(innerWidth, innerHeight);
    renderer.shadowMap.enabled = true;
    renderer.shadowMap.type = THREE.PCFSoftShadowMap;
    renderer.toneMapping = THREE.ACESFilmicToneMapping;
    renderer.toneMappingExposure = 1.25;
    document.body.prepend(renderer.domElement);

    // ── Scene & Camera ─────────────────────────────────────────────────────────
    const scene = new THREE.Scene();
    scene.fog = new THREE.FogExp2(0x050514, 0.032);

    const camera = new THREE.PerspectiveCamera(50, innerWidth / innerHeight, 0.1, 500);
    camera.position.set(0, 25, 17);
    camera.lookAt(0, 0, 0);

    // ── Lighting ───────────────────────────────────────────────────────────────
    scene.add(new THREE.AmbientLight(0x112255, 3));

    const sun = new THREE.DirectionalLight(0xffffff, 4.5);
    sun.position.set(10, 20, 8);
    sun.castShadow = true;
    sun.shadow.mapSize.setScalar(2048);
    sun.shadow.camera.near = 1;
    sun.shadow.camera.far = 70;
    sun.shadow.camera.left = sun.shadow.camera.bottom = -15;
    sun.shadow.camera.right = sun.shadow.camera.top = 15;
    scene.add(sun);

    const rimLight = new THREE.DirectionalLight(0x2244ff, 1.8);
    rimLight.position.set(-10, 5, -10);
    scene.add(rimLight);

    // ── Board ──────────────────────────────────────────────────────────────────
    const floor = new THREE.Mesh(
      new THREE.BoxGeometry(GRID, 0.28, GRID),
      new THREE.MeshStandardMaterial({ color: 0x0c0c20, roughness: 0.95, metalness: 0.08 })
    );
    floor.position.y = -0.64;
    floor.receiveShadow = true;
    scene.add(floor);

    const gridHelper = new THREE.GridHelper(GRID, GRID, 0x1a3355, 0x111833);
    gridHelper.position.y = -0.49;
    scene.add(gridHelper);

    // Neon border
    const bPts = [
      [-HALF, -HALF], [HALF, -HALF], [HALF, HALF], [-HALF, HALF], [-HALF, -HALF]
    ].map(([x, z]) => new THREE.Vector3(x, 0.02, z));
    scene.add(new THREE.Line(
      new THREE.BufferGeometry().setFromPoints(bPts),
      new THREE.LineBasicMaterial({ color: 0x0066cc })
    ));

    // ── Shared Geometry & Materials ────────────────────────────────────────────
    const segGeo = new THREE.BoxGeometry(0.86, 0.86, 0.86);

    const headMat = new THREE.MeshStandardMaterial({
      color: 0x00ff88, emissive: 0x00cc55, emissiveIntensity: 0.9,
      roughness: 0.12, metalness: 0.75
    });
    const bodyMat = new THREE.MeshStandardMaterial({
      color: 0x00bb66, emissive: 0x003322, emissiveIntensity: 0.35,
      roughness: 0.28, metalness: 0.55
    });

    // Food: icosahedron for a gem look
    const foodMesh = new THREE.Mesh(
      new THREE.IcosahedronGeometry(0.44, 1),
      new THREE.MeshStandardMaterial({
        color: 0xff4422, emissive: 0xff2200, emissiveIntensity: 1.3,
        roughness: 0.12, metalness: 0.45
      })
    );
    foodMesh.castShadow = true;
    const foodGlow = new THREE.PointLight(0xff3300, 5, 7);
    foodMesh.add(foodGlow);
    scene.add(foodMesh);

    // ── Helpers ────────────────────────────────────────────────────────────────
    function toWorld(x, z) {
      return [x - HALF + 0.5, z - HALF + 0.5];
    }

    function makeSeg(pos, mat) {
      const m = new THREE.Mesh(segGeo, mat);
      m.castShadow = m.receiveShadow = true;
      const [wx, wz] = toWorld(pos.x, pos.z);
      m.position.set(wx, 0.5, wz);
      scene.add(m);
      return m;
    }

    // ── Game State ─────────────────────────────────────────────────────────────
    let snake, dir, nextDir, food, score, alive, tickId;
    const segs = []; // parallel array to snake[] — each is a Three.js Mesh

    const scoreEl = document.getElementById('score');
    const overlay  = document.getElementById('overlay');

    function spawnFood() {
      let p;
      do {
        p = { x: Math.random() * GRID | 0, z: Math.random() * GRID | 0 };
      } while (snake.some(s => s.x === p.x && s.z === p.z));
      food = p;
      const [wx, wz] = toWorld(p.x, p.z);
      foodMesh.position.set(wx, 0.5, wz);
    }

    function resetGame() {
      segs.forEach(m => scene.remove(m));
      segs.length = 0;

      snake   = [{ x: 12, z: 10 }, { x: 11, z: 10 }, { x: 10, z: 10 }];
      dir     = { x: 1, z: 0 };
      nextDir = { x: 1, z: 0 };
      score   = 0;
      alive   = true;

      snake.forEach((p, i) => segs.push(makeSeg(p, i === 0 ? headMat : bodyMat)));
      spawnFood();
      scoreEl.textContent = 'SCORE: 0';
      overlay.classList.add('hidden');

      clearInterval(tickId);
      tickId = setInterval(tick, TICK);
    }

    function tick() {
      dir = nextDir;
      const nh = { x: snake[0].x + dir.x, z: snake[0].z + dir.z };

      // Wall collision
      if (nh.x < 0 || nh.x >= GRID || nh.z < 0 || nh.z >= GRID) return gameOver();

      // Self collision — exclude tail because it's moving away (unless eating)
      const willEat = nh.x === food.x && nh.z === food.z;
      const body = willEat ? snake : snake.slice(0, -1);
      if (body.some(s => s.x === nh.x && s.z === nh.z)) return gameOver();

      // Remove tail if not eating
      if (!willEat) {
        scene.remove(segs.pop());
        snake.pop();
      }

      // Downgrade old head to body
      if (segs[0]) segs[0].material = bodyMat;

      // Add new head
      segs.unshift(makeSeg(nh, headMat));
      snake.unshift(nh);

      if (willEat) {
        score++;
        scoreEl.textContent = `SCORE: ${score}`;
        spawnFood();
      }
    }

    function gameOver() {
      alive = false;
      clearInterval(tickId);
      overlay.innerHTML = `
        <h1>GAME OVER</h1>
        <p>PONTUAÇÃO FINAL: ${score}</p>
        <p class="sub">ENTER ou ESPAÇO para recomeçar</p>
      `;
      overlay.classList.remove('hidden');
    }

    // ── Controls ───────────────────────────────────────────────────────────────
    document.addEventListener('keydown', e => {
      const k = e.key;
      if (k === 'ArrowUp'    || k === 'w' || k === 'W') { if (dir.z !==  1) nextDir = { x: 0, z: -1 }; }
      if (k === 'ArrowDown'  || k === 's' || k === 'S') { if (dir.z !== -1) nextDir = { x: 0, z:  1 }; }
      if (k === 'ArrowLeft'  || k === 'a' || k === 'A') { if (dir.x !==  1) nextDir = { x:-1, z:  0 }; }
      if (k === 'ArrowRight' || k === 'd' || k === 'D') { if (dir.x !== -1) nextDir = { x: 1, z:  0 }; }
      if ((k === 'Enter' || k === ' ') && !alive) resetGame();
      // Prevent arrow keys from scrolling
      if (k.startsWith('Arrow')) e.preventDefault();
    });

    // ── Resize ─────────────────────────────────────────────────────────────────
    window.addEventListener('resize', () => {
      camera.aspect = innerWidth / innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(innerWidth, innerHeight);
    });

    // ── Render Loop ────────────────────────────────────────────────────────────
    let t = 0;
    (function animate() {
      requestAnimationFrame(animate);
      t += 0.016;

      // Food: float + spin + glow pulse
      foodMesh.position.y = 0.5 + Math.sin(t * 2.8) * 0.14;
      foodMesh.rotation.y = t * 1.6;
      foodMesh.rotation.x = t * 0.7;
      foodGlow.intensity = 4 + Math.sin(t * 5) * 1.5;

      // Head glow breathe
      headMat.emissiveIntensity = 0.75 + Math.sin(t * 4) * 0.2;

      renderer.render(scene, camera);
    })();

    // ── Start ──────────────────────────────────────────────────────────────────
    document.addEventListener('keydown', function startOnce(e) {
      if (e.key === 'Enter' || e.key === ' ') {
        document.removeEventListener('keydown', startOnce);
        resetGame();
      }
    });
  </script>
</body>
</html>
